<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Family Phone | Connect Instantly</title>
  <!-- Twilio SDK (local) -->
  <script src="/static/twilio.min.js"></script>
  
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js')
      .then(() => console.log('SW registered'))
      .catch(err => console.log('SW error', err));
  }
</script>
<link rel="manifest" href="/static/manifest.json">
  <!-- Font Awesome for icons (optional) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .phone-card {
      max-width: 500px;
      width: 100%;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 2rem;
      padding: 2rem 1.5rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }

    h1 {
      font-size: 1.8rem;
      text-align: center;
      margin-bottom: 1.5rem;
      font-weight: 600;
      background: linear-gradient(135deg, #f0f9ff, #bae6fd);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .status-container {
      background: #0f172a;
      border-radius: 1.5rem;
      padding: 1rem;
      margin-bottom: 1.5rem;
      text-align: center;
      border: 1px solid #334155;
    }

    #status {
      font-size: 1.1rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .status-icon {
      font-size: 1.4rem;
    }

    .availability-note {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 1rem;
      font-size: 0.95rem;
      line-height: 1.45;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .availability-note.warning {
      background: rgba(127, 29, 29, 0.35);
      color: #fecaca;
      border-color: rgba(248, 113, 113, 0.35);
    }

    .availability-note.info {
      background: rgba(30, 64, 175, 0.28);
      color: #dbeafe;
      border-color: rgba(96, 165, 250, 0.35);
    }

    .availability-note.success {
      background: rgba(6, 95, 70, 0.32);
      color: #d1fae5;
      border-color: rgba(52, 211, 153, 0.35);
    }

    .button-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    button {
      background: #3b82f6;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 2rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    button i {
      font-size: 1.1rem;
    }

    button:active {
      transform: scale(0.97);
    }

    button:disabled {
      opacity: 0.5;
      transform: none;
      cursor: not-allowed;
    }

    .btn-connect {
      background: #10b981;
    }
    .btn-connect:hover:not(:disabled) {
      background: #059669;
    }
    .btn-disconnect {
      background: #ef4444;
    }
    .btn-disconnect:hover:not(:disabled) {
      background: #dc2626;
    }
    .btn-answer {
      background: #10b981;
    }
    .btn-reject {
      background: #ef4444;
    }
    .btn-hangup {
      background: #dc2626;
    }

    .incoming-card {
      background: #1e293b;
      border-radius: 1.5rem;
      padding: 1rem;
      margin-bottom: 1.5rem;
      text-align: center;
      border-left: 4px solid #10b981;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { border-left-color: #10b981; }
      50% { border-left-color: #34d399; }
      100% { border-left-color: #10b981; }
    }

    .call-timer {
      background: #0f172a;
      border-radius: 2rem;
      padding: 8px 16px;
      font-size: 1.2rem;
      font-weight: 600;
      font-family: monospace;
      text-align: center;
      margin: 10px auto;
      display: inline-block;
      width: auto;
    }

    .log-area {
      background: #0f172a;
      border-radius: 1rem;
      padding: 12px;
      margin-top: 1rem;
      max-height: 180px;
      overflow-y: auto;
      font-size: 0.8rem;
      font-family: monospace;
      border: 1px solid #334155;
    }

    .log-entry {
      padding: 4px 0;
      border-bottom: 1px solid #1e293b;
      color: #cbd5e1;
    }

    .log-time {
      color: #94a3b8;
      margin-right: 8px;
    }

    .call-active {
      background: #0f172a;
      border-radius: 1rem;
      padding: 12px;
      margin: 12px 0;
      text-align: center;
    }

    footer {
      text-align: center;
      font-size: 0.7rem;
      margin-top: 1.5rem;
      color: #64748b;
    }

    @media (max-width: 480px) {
      .phone-card {
        padding: 1.5rem 1rem;
      }
      button {
        padding: 10px 20px;
        font-size: 0.9rem;
      }
      #status {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
<div class="phone-card">
  <h1><i class="fas fa-phone-alt"></i> Iran-UK Family Phone</h1>
  <h4>+44 161 524 6401</h4>

  <div class="status-container">
    <div id="status">
      <span class="status-icon"><i class="fas fa-circle-notch fa-spin"></i></span>
      <span>Not ready to receive calls</span>
    </div>
    <div id="availabilityNote" class="availability-note warning">
      Tap Connect once to activate phone service. Until then, this page cannot reliably receive calls.
    </div>
  </div>

  <div class="button-group">
    <button id="connectBtn" class="btn-connect"><i class="fas fa-plug"></i> Connect</button>
    <button id="disconnectBtn" class="btn-disconnect" style="display: none;"><i class="fas fa-power-off"></i> Disconnect</button>
  </div>

  <div id="incoming" style="display: none;" class="incoming-card">
    <i class="fas fa-phone-volume fa-2x" style="color:#10b981;"></i>
    <p id="callerInfo" style="margin: 8px 0; font-weight: bold;">📞 Incoming call from!</p>
    <div style="display: flex; gap: 12px; justify-content: center; margin-top: 10px;">
      <button id="answerBtn" class="btn-answer"><i class="fas fa-check-circle"></i> Answer</button>
      <button id="rejectBtn" class="btn-reject"><i class="fas fa-times-circle"></i> Reject</button>
    </div>
  </div>

  <div id="callControls" style="display: none;" class="call-active">
    <div><i class="fas fa-phone-slash"></i> On a call</div>
    <div id="callTimer" class="call-timer">00:00</div>
    <button id="hangupBtn" class="btn-hangup" style="margin-top: 8px;"><i class="fas fa-phone-slash"></i> Hang Up</button>
  </div>

  <div class="log-area" id="log">
    <div class="log-entry"><span class="log-time">System</span> Ready</div>
  </div>
  <footer><i class="fas fa-lock"></i> Secure connection | Twilio Voice</footer>
</div>

<script>
  let device = null;
  let currentCall = null;
  let callStartTime = null;
  let timerInterval = null;
  let manualConnectInProgress = false;
  let autoReconnectAttempted = false;

  const AUTO_CONNECT_STORAGE_KEY = 'family-phone-auto-connect-enabled';
  const RECONNECT_DELAY_MS = 5000;

  const statusEl = document.getElementById('status');
  const availabilityNoteEl = document.getElementById('availabilityNote');
  const connectBtn = document.getElementById('connectBtn');
  const disconnectBtn = document.getElementById('disconnectBtn');
  const incomingEl = document.getElementById('incoming');
  const callControls = document.getElementById('callControls');
  const callTimerDiv = document.getElementById('callTimer');
  const logEl = document.getElementById('log');

  async function requestMicPermission() {
    try {
      await navigator.mediaDevices.getUserMedia({audio: true});
      log("Microphone access granted");
    } catch(err) {
      log("Mic permission denied: " + err.message, true);
      return false;
    }
    return true;
  }

  function log(msg, isError = false) {
    const time = new Date().toLocaleTimeString();
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    if (isError) entry.style.color = '#f87171';
    entry.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
    logEl.appendChild(entry);
    entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function updateStatus(icon, text, isError = false) {
    statusEl.innerHTML = `<span class="status-icon">${icon}</span><span>${text}</span>`;
    if (isError) statusEl.style.color = '#f87171';
    else statusEl.style.color = 'white';
  }

  function updateAvailabilityNote(text, tone = 'info') {
    availabilityNoteEl.textContent = text;
    availabilityNoteEl.className = `availability-note ${tone}`;
  }

  function hasAutoConnectEnabled() {
    return localStorage.getItem(AUTO_CONNECT_STORAGE_KEY) === 'true';
  }

  function setAutoConnectEnabled(enabled) {
    if (enabled) localStorage.setItem(AUTO_CONNECT_STORAGE_KEY, 'true');
    else localStorage.removeItem(AUTO_CONNECT_STORAGE_KEY);
  }

  function setConnectedUiState(connected) {
    connectBtn.style.display = connected ? 'none' : 'inline-flex';
    disconnectBtn.style.display = connected ? 'inline-flex' : 'none';
    connectBtn.disabled = false;
  }

  function resetCallUI() {
    if (timerInterval) clearInterval(timerInterval);
    callStartTime = null;
    callControls.style.display = 'none';
    incomingEl.style.display = 'none';
    if (currentCall) {
      // ensure we don't leave dangling event handlers
      currentCall = null;
    }
  }

  function startCallTimer() {
    callStartTime = Date.now();
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (!currentCall || currentCall.status() !== 'open') {
        clearInterval(timerInterval);
        return;
      }
      const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
      const mins = Math.floor(elapsed / 60);
      const secs = elapsed % 60;
      callTimerDiv.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }, 1000);
  }

  async function fetchToken() {
    const res = await fetch('/token');
    if (!res.ok) throw new Error(`Token request failed (${res.status})`);
    return res.json();
  }

  async function refreshToken() {
    if (!device) return;
    try {
      const data = await fetchToken();
      device.updateToken(data.token);
      log('Access token refreshed');
    } catch (err) {
      log(`Token refresh failed: ${err.message}`, true);
    }
  }

  function scheduleReconnect(reason) {
    if (!hasAutoConnectEnabled() || manualConnectInProgress || currentCall) return;
    updateAvailabilityNote(`Trying to reconnect automatically${reason ? `: ${reason}` : ''}. If this does not work, tap Connect again.`, 'info');
    window.setTimeout(() => {
      if (!device && hasAutoConnectEnabled()) {
        connectToTwilio({ manual: false }).catch(() => {});
      }
    }, RECONNECT_DELAY_MS);
  }

  function wireDeviceEvents() {
    device.on('ready', () => {
      updateStatus('<i class="fas fa-check-circle" style="color:#10b981;"></i>', 'Ready to receive calls');
      updateAvailabilityNote('Phone service is active. This page can now receive incoming calls.', 'success');
      setConnectedUiState(true);
      if (manualConnectInProgress) {
        setAutoConnectEnabled(true);
      }
      manualConnectInProgress = false;
      log('Twilio Device is ready');
    });

    device.on('registering', () => {
      updateStatus('<i class="fas fa-spinner fa-pulse"></i>', 'Registering phone service...');
      updateAvailabilityNote('Connecting your browser to Twilio so incoming calls can ring here.', 'info');
    });

    device.on('registered', () => {
      updateStatus('<i class="fas fa-check-circle" style="color:#10b981;"></i>', 'Ready to receive calls');
      updateAvailabilityNote('Phone service is active. This page can now receive incoming calls.', 'success');
      setConnectedUiState(true);
      if (manualConnectInProgress) {
        setAutoConnectEnabled(true);
      }
      manualConnectInProgress = false;
      log('Twilio Device registered successfully');
    });

    device.on('unregistered', () => {
      updateStatus('<i class="fas fa-sync-alt"></i>', 'Connection lost');
      setConnectedUiState(false);
      log('Device unregistered');
      device = null;
      scheduleReconnect('connection lost');
    });

    device.on('incoming', (call) => {
      currentCall = call;
      document.getElementById('callerInfo').textContent = call.from;
      incomingEl.style.display = 'block';
      updateStatus('<i class="fas fa-phone-volume fa-fade"></i>', 'Incoming call');
      updateAvailabilityNote('Incoming call is ringing now. Answer or reject below.', 'success');
      log('Incoming call received');

      currentCall.ondisconnect = function() {
        log("Call ended");
        resetCallUI();
        updateStatus('<i class="fas fa-check-circle" style="color:#10b981"></i>', 'Ready to receive calls');
        updateAvailabilityNote('Phone service is still active and waiting for the next call.', 'success');
      };
    });

    device.on('tokenWillExpire', refreshToken);

    device.on('error', (err) => {
      updateStatus('<i class="fas fa-exclamation-triangle" style="color:#f87171;"></i>', `Connection problem: ${err.message}`, true);
      updateAvailabilityNote('This page is not fully ready right now. Tap Connect if auto-reconnect does not recover.', 'warning');
      log(`Device error: ${err.message}`, true);
      setConnectedUiState(false);
      manualConnectInProgress = false;
      if (device && hasAutoConnectEnabled()) {
        device = null;
        scheduleReconnect(err.message);
      }
    });
  }

  async function connectToTwilio({ manual }) {
    if (device || manualConnectInProgress) return;

    manualConnectInProgress = manual;
    connectBtn.disabled = true;
    updateStatus('<i class="fas fa-spinner fa-pulse"></i>', manual ? 'Connecting to Twilio...' : 'Reconnecting automatically...');
    updateAvailabilityNote(
      manual
        ? 'Setting up phone service. Keep this page open so it can receive calls.'
        : 'Trying to restore phone service automatically from your previous approval.',
      'info'
    );

    try {
      const data = await fetchToken();

      device = new Twilio.Device(data.token, {
        codecPreferences: ['opus', 'pcmu']
      });
      wireDeviceEvents();
      device.register();
    } catch (err) {
      device = null;
      manualConnectInProgress = false;
      updateStatus('<i class="fas fa-exclamation-triangle" style="color:#f87171;"></i>', `Failed to connect: ${err.message}`, true);
      updateAvailabilityNote('Phone service is not active yet. Tap Connect to make this page available for calls.', 'warning');
      log(`Connection error: ${err}`, true);
      setConnectedUiState(false);
    }
  }

  connectBtn.addEventListener('click', async () => {
    if (!await requestMicPermission()) return;
    await connectToTwilio({ manual: true });
  });

  disconnectBtn.addEventListener('click', () => {
    if (device) {
      device.destroy();
      device = null;
    }
    setAutoConnectEnabled(false);
    updateStatus('<i class="fas fa-circle-notch"></i>', 'Not ready to receive calls');
    updateAvailabilityNote('Phone service was turned off. Tap Connect to make this page available for calls again.', 'warning');
    setConnectedUiState(false);
    resetCallUI();
    log('Device disconnected');
  });

  document.getElementById('answerBtn').addEventListener('click', () => {
    if (currentCall) {
      currentCall.accept();
      incomingEl.style.display = 'none';
      callControls.style.display = 'block';
      updateStatus('<i class="fas fa-phone-alt" style="color:#10b981;"></i>', 'On call');
      updateAvailabilityNote('Call connected. You can hang up at any time.', 'success');
      log('Call answered');
      startCallTimer();

      // attach hangup listener for call events
      currentCall.ondisconnect = function() {
        log('Call ended by remote');
        resetCallUI();
        updateStatus('<i class="fas fa-check-circle" style="color:#10b981;"></i>', 'Ready to receive calls');
        updateAvailabilityNote('Phone service is still active and waiting for the next call.', 'success');
      };
    }
  });

  document.getElementById('rejectBtn').addEventListener('click', () => {
    if (currentCall) {
      currentCall.reject();
      incomingEl.style.display = 'none';
      updateStatus('<i class="fas fa-check-circle" style="color:#10b981;"></i>', 'Ready to receive calls');
      updateAvailabilityNote('Call was rejected. Phone service remains active for the next call.', 'success');
      log('Call rejected');
      currentCall = null;
    }
  });

  // Hangup button during active call
  const hangupBtn = document.getElementById('hangupBtn');
  hangupBtn.addEventListener('click', () => {
    if (currentCall) {
      currentCall.disconnect();
      log('Call hung up by user');
      resetCallUI();
      updateStatus('<i class="fas fa-check-circle" style="color:#10b981;"></i>', 'Ready to receive calls');
      updateAvailabilityNote('Call ended. Phone service remains active for incoming calls.', 'success');
    }
  });

  window.addEventListener('load', () => {
    if (hasAutoConnectEnabled() && !autoReconnectAttempted) {
      autoReconnectAttempted = true;
      updateStatus('<i class="fas fa-sync-alt fa-spin"></i>', 'Checking phone service...');
      updateAvailabilityNote('Trying to restore phone service automatically from your last successful connect.', 'info');
      connectToTwilio({ manual: false }).catch(() => {});
    } else {
      updateAvailabilityNote('Tap Connect once to activate phone service. Until then, this page cannot reliably receive calls.', 'warning');
    }
  });

  // Optional: clear timer on page unload
  window.addEventListener('beforeunload', () => {
    if (timerInterval) clearInterval(timerInterval);
  });
</script>
</body>
</html>
