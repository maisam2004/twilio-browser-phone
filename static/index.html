<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iran-UK Family Phone</title>
  <script src="https://sdk.twilio.com/js/voice/v2/twilio.min.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; margin: 0; min-height: 100vh; }
    .container { max-width: 420px; margin: 40px auto; }
    h1 { font-size: 28px; margin-bottom: 30px; }
    #status { 
      font-size: 20px; padding: 20px; background: #1e2937; border-radius: 12px; 
      margin: 20px 0; min-height: 70px; display: flex; align-items: center; justify-content: center;
    }
    button { 
      background: #22c55e; color: white; border: none; padding: 18px 40px; 
      font-size: 20px; border-radius: 12px; margin: 10px; cursor: pointer; width: 100%; max-width: 280px;
    }
    button:disabled { background: #64748b; }
    .red { background: #ef4444; }
    #log { margin-top: 30px; text-align: left; font-size: 14px; background: #1e2937; padding: 15px; border-radius: 12px; max-height: 220px; overflow-y: auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🇮🇷 Family Phone 🇬🇧</h1>
    
    <div id="status">🔴 Disconnected - Click Connect</div>
    
    <button id="connectBtn">Connect</button>
    <button id="disconnectBtn" class="red" style="display:none;">Disconnect</button>

    <div id="incoming" style="display:none; margin-top:20px;">
      <p><strong>📞 Incoming call from Iran!</strong></p>
      <button id="answerBtn">Answer</button>
      <button id="rejectBtn" class="red">Reject</button>
    </div>

    <div id="log">Log will appear here...</div>
  </div>

  <script>
    let device = null;
    let currentCall = null;

    const statusEl = document.getElementById('status');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const incomingEl = document.getElementById('incoming');
    const logEl = document.getElementById('log');

    function log(msg) {
      const time = new Date().toLocaleTimeString();
      logEl.innerHTML += `<div>[${time}] ${msg}</div>`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    connectBtn.addEventListener('click', async () => {
      connectBtn.disabled = true;
      statusEl.textContent = "Connecting to Twilio...";

      try {
        const res = await fetch('/token');
        if (!res.ok) throw new Error("Token failed");
        const data = await res.json();

        device = new Twilio.Device(data.token);

        device.on('ready', () => {
          statusEl.innerHTML = "✅ Ready - Waiting for call from Iran";
          connectBtn.style.display = 'none';
          disconnectBtn.style.display = 'inline-block';
          log("✅ Device registered successfully");
        });

        device.on('incoming', (call) => {
          currentCall = call;
          incomingEl.style.display = 'block';
          statusEl.textContent = "📞 Incoming call from Iran!";
          log("📞 Incoming call detected");
        });

        device.on('error', (err) => {
          statusEl.textContent = "❌ Error: " + err.message;
          log("Error: " + err.message);
        });

        device.register();

      } catch (err) {
        statusEl.textContent = "❌ Failed to connect - " + err.message;
        log("Connection error: " + err);
        connectBtn.disabled = false;
      }
    });

    disconnectBtn.addEventListener('click', () => {
      if (device) device.destroy();
      statusEl.textContent = "🔴 Disconnected";
      connectBtn.style.display = 'inline-block';
      disconnectBtn.style.display = 'none';
      incomingEl.style.display = 'none';
      log("Device disconnected");
    });

    document.getElementById('answerBtn').addEventListener('click', () => {
      if (currentCall) {
        currentCall.accept();
        incomingEl.style.display = 'none';
        statusEl.textContent = "✅ On call";
        log("Call answered");
      }
    });

    document.getElementById('rejectBtn').addEventListener('click', () => {
      if (currentCall) {
        currentCall.reject();
        incomingEl.style.display = 'none';
        statusEl.textContent = "✅ Ready - Waiting for call from Iran";
        log("Call rejected");
      }
    });
  </script>
</body>
</html>
