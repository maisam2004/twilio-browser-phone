<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Phone</title>
  <script src="https://sdk.twilio.com/js/voice/v2/twilio.min.js" crossorigin="anonymous"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; margin: 0; min-height: 100vh; }
    .container { max-width: 400px; margin: 40px auto; }
    h1 { margin: 0 0 30px; font-size: 28px; }
    #status { font-size: 18px; margin: 20px 0; padding: 15px; border-radius: 12px; background: #1e2937; }
    button { background: #22c55e; color: white; border: none; padding: 16px 32px; font-size: 18px; border-radius: 12px; margin: 10px; cursor: pointer; width: 200px; }
    button:disabled { background: #64748b; }
    .call-btn { background: #ef4444; }
    #log { margin-top: 30px; text-align: left; font-size: 14px; background: #1e2937; padding: 15px; border-radius: 12px; max-height: 200px; overflow-y: auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🇮🇷 Family Phone 🇬🇧</h1>
    <div id="status">🔴 Disconnected - Click Connect</div>
    
    <button id="connectBtn">Connect</button>
    <button id="disconnectBtn" style="display:none;" class="call-btn">Disconnect</button>

    <div id="incoming" style="display:none; margin-top:20px;">
      <p><strong>📞 Incoming call from Iran!</strong></p>
      <button id="answerBtn">Answer</button>
      <button id="rejectBtn" class="call-btn">Reject</button>
    </div>

    <div id="log">Call log will appear here...</div>
  </div>

    <script>
    let device = null;
    let currentCall = null;
    const statusEl = document.getElementById('status');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const incomingEl = document.getElementById('incoming');
    const logEl = document.getElementById('log');

    function log(msg) {
      const time = new Date().toLocaleTimeString();
      logEl.innerHTML += `<div>[${time}] ${msg}</div>`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    connectBtn.addEventListener('click', async () => {
      connectBtn.disabled = true;
      statusEl.textContent = "Connecting...";

      // Make sure Twilio SDK is loaded
      if (typeof Twilio === 'undefined' || !Twilio.Device) {
        statusEl.textContent = "❌ Twilio SDK not loaded. Refresh page.";
        connectBtn.disabled = false;
        return;
      }

      try {
        const res = await fetch('/token');
        if (!res.ok) throw new Error("Token request failed");
        const data = await res.json();

        device = new Twilio.Device(data.token, { 
          codecPreferences: ['opus', 'pcmu'] 
        });

        device.on('ready', () => {
          statusEl.innerHTML = "✅ Ready - Waiting for call from Iran";
          connectBtn.style.display = 'none';
          disconnectBtn.style.display = 'inline-block';
          log("✅ Device registered successfully");
        });

        device.on('incoming', (call) => {
          currentCall = call;
          incomingEl.style.display = 'block';
          statusEl.textContent = "📞 Incoming call from Iran!";
          log("📞 Incoming call detected");
        });

        device.on('error', (err) => {
          statusEl.textContent = "❌ Error: " + err.message;
          log("Error: " + err.message);
        });

        device.register();

      } catch (err) {
        statusEl.textContent = "❌ Failed to connect - " + err.message;
        log("Connection error: " + err);
        connectBtn.disabled = false;
      }
    });

    disconnectBtn.addEventListener('click', () => {
      if (device) device.destroy();
      statusEl.textContent = "🔴 Disconnected";
      connectBtn.style.display = 'inline-block';
      disconnectBtn.style.display = 'none';
      incomingEl.style.display = 'none';
      log("Device disconnected");
    });

    document.getElementById('answerBtn').addEventListener('click', () => {
      if (currentCall) {
        currentCall.accept();
        incomingEl.style.display = 'none';
        statusEl.textContent = "✅ On call";
        log("Call answered");
      }
    });

    document.getElementById('rejectBtn').addEventListener('click', () => {
      if (currentCall) {
        currentCall.reject();
        incomingEl.style.display = 'none';
        statusEl.textContent = "✅ Ready - Waiting for call from Iran";
        log("Call rejected");
      }
    });
  </script>
</body>
</html>
