<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iran-UK Family Phone</title>
  <script src="https://cdn.jsdelivr.net/npm/@telnyx/webrtc@2/dist/telnyx-webrtc.min.js"></script>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
      margin: 0;
      min-height: 100vh;
    }
    .container { max-width: 420px; margin: 40px auto; }
    h1 { font-size: 28px; margin-bottom: 30px; }
    #status {
      font-size: 20px;
      padding: 20px;
      background: #1e2937;
      border-radius: 12px;
      margin: 20px 0;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    button {
      background: #22c55e;
      color: white;
      border: none;
      padding: 18px 40px;
      font-size: 20px;
      border-radius: 12px;
      margin: 10px;
      cursor: pointer;
      width: 100%;
      max-width: 280px;
    }
    button:disabled { background: #64748b; }
    .red { background: #ef4444; }
    #log {
      margin-top: 30px;
      text-align: left;
      font-size: 14px;
      background: #1e2937;
      padding: 15px;
      border-radius: 12px;
      max-height: 220px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🇮🇷 Family Phone 🇬🇧</h1>
    
    <div id="status">🔴 Disconnected - Click Connect</div>
    
    <button id="connectBtn">Connect</button>
    <button id="disconnectBtn" class="red" style="display:none;">Disconnect</button>

    <div id="incoming" style="display:none; margin-top:20px;">
      <p><strong>📞 Incoming call from Iran!</strong></p>
      <button id="answerBtn">Answer</button>
      <button id="rejectBtn" class="red">Reject</button>
    </div>

    <div id="log">Log will appear here...</div>
  </div>

  <script>
    let client = null;
    let currentCall = null;

    const statusEl = document.getElementById('status');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const incomingEl = document.getElementById('incoming');
    const logEl = document.getElementById('log');

    function log(msg) {
      const time = new Date().toLocaleTimeString();
      logEl.innerHTML += `<div>[${time}] ${msg}</div>`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    connectBtn.addEventListener('click', async () => {
      connectBtn.disabled = true;
      statusEl.textContent = "Connecting to Telnyx...";

      try {
        // Replace these with your actual Telnyx SIP credentials
        client = new TelnyxRTC({
          login: "YOUR_SIP_USERNAME@YOUR_SIP_SUBDOMAIN.sip.telnyx.com",   // ← Change this
          password: "YOUR_SIP_PASSWORD",                                 // ← Change this
          // If you have JWT instead, use: tokenLogin: "your_jwt_token"
        });

        client.on('telnyx.ready', () => {
          statusEl.innerHTML = "✅ Ready - Waiting for call from Iran";
          connectBtn.style.display = 'none';
          disconnectBtn.style.display = 'inline-block';
          log("✅ Connected successfully to Telnyx");
        });

        client.on('telnyx.notification', (notification) => {
          if (notification.type === 'call') {
            currentCall = notification.call;
            incomingEl.style.display = 'block';
            statusEl.textContent = "📞 Incoming call from Iran!";
            log("📞 Incoming call received");
          }
        });

        client.connect();

      } catch (err) {
        statusEl.textContent = "❌ Connection failed";
        log("Error: " + err.message);
        connectBtn.disabled = false;
      }
    });

    disconnectBtn.addEventListener('click', () => {
      if (client) client.disconnect();
      statusEl.textContent = "🔴 Disconnected";
      connectBtn.style.display = 'inline-block';
      disconnectBtn.style.display = 'none';
      incomingEl.style.display = 'none';
      log("Disconnected");
    });

    document.getElementById('answerBtn').addEventListener('click', () => {
      if (currentCall) {
        currentCall.answer();
        incomingEl.style.display = 'none';
        statusEl.textContent = "✅ On call";
        log("Call answered");
      }
    });

    document.getElementById('rejectBtn').addEventListener('click', () => {
      if (currentCall) {
        currentCall.hangup();
        incomingEl.style.display = 'none';
        statusEl.textContent = "✅ Ready - Waiting for call from Iran";
        log("Call rejected");
      }
    });
  </script>
</body>
</html>
