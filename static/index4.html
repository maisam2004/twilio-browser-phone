<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Phone</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: white; text-align: center; padding: 40px 20px; margin: 40px auto ; max-width: 420px;  }
    .container {
      max-width: 420px;        /* ← This makes it nice and narrow */
      margin: 40px auto;
    }
    h1 { font-size: 28px; margin-bottom: 30px; }
    #status { font-size: 20px; padding: 20px; background: #1e2937; border-radius: 12px; margin: 20px 0; }
    button { 
      background: #22c55e; color: white; border: none; padding: 18px 40px; 
      font-size: 20px; border-radius: 12px; margin: 10px; cursor: pointer; 
    }
    button:disabled { background: #64748b; }
  </style>
</head>
<body>
  <h1>🇮🇷 Family Phone 🇬🇧</h1>
  
  <div id="status">🔴 Disconnected - Click Connect</div>
  
  <button id="connectBtn">Connect</button>

  <div id="log" style="margin-top:30px; text-align:left; background:#1e2937; padding:15px; border-radius:12px; max-height:200px; overflow:auto; font-size:14px;">
    Log will appear here...
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const connectBtn = document.getElementById('connectBtn');
    const logEl = document.getElementById('log');

    function log(msg) {
      const time = new Date().toLocaleTimeString();
      logEl.innerHTML += `<div>[${time}] ${msg}</div>`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    connectBtn.addEventListener('click', async () => {
      connectBtn.disabled = true;
      statusEl.textContent = "Connecting to Twilio...";
      log("Attempting to connect...");

      try {
        const res = await fetch('/token');
        if (!res.ok) throw new Error("Token failed");
        const data = await res.json();

        statusEl.innerHTML = "✅ Token received successfully!<br><br>Now we need to buy a UK number to finish setup.";
        log("✅ Token received - ready for next step");

      } catch (err) {
        statusEl.textContent = "❌ Token error: " + err.message;
        log("Error: " + err.message);
        connectBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
